version: "3.8"

services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./app/backend
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis

  frontend:
    build:
      context: ./app/frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8000
